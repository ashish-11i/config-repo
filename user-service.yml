spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5432/ms_user_db   # overridden by SPRING_DATASOURCE_URL in Docker
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update       # safe default for local IDE run; profiles override this
    show-sql: false
    open-in-view: false      # prevent DB connections being held open during HTTP rendering
    properties:
      hibernate: {}          # dialect is auto-detected by Hibernate 6 — do not set explicitly
  config:
    import: optional:configserver:http://localhost:8888   # overridden by SPRING_CONFIG_IMPORT in Docker

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka   # overridden by EUREKA_CLIENT_SERVICEURL_DEFAULTZONE in Docker

server:
  port: 8081

logging:
  level:
    root: INFO
