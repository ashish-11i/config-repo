server:
  port: 8082

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://localhost:5432/ms_order_db   # overridden by SPRING_DATASOURCE_URL env var in Docker
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update       # safe default for local IDE run; profiles override this
    show-sql: false
    open-in-view: false      # prevent DB connections being held open during HTTP rendering
    properties:
      hibernate: {}          # dialect is auto-detected by Hibernate 6 — do not set explicitly
  config:
    import: optional:configserver:http://localhost:8888   # overridden by SPRING_CONFIG_IMPORT in Docker

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka   # overridden by EUREKA_CLIENT_SERVICEURL_DEFAULTZONE env var in Docker

feign:
  circuitbreaker:
    enabled: true

resilience4j:
  circuitbreaker:
    instances:
      user-service:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000ms
        permittedNumberOfCallsInHalfOpenState: 3
  timelimiter:
    instances:
      user-service:
        timeoutDuration: 3s

management:
  endpoints:
    web:
      exposure:
        include: health,refresh

logging:
  level:
    root: INFO
